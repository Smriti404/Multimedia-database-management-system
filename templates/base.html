<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Multimedia DB{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<nav>
  <a class="brand" href="{{ url_for('index') }}">🎬 Multimedia<span>DB</span></a>
  <ul>
    <li><a href="{{ url_for('index') }}" {% if request.endpoint=='index' %}class="active"{% endif %}>Home</a></li>
    <li><a href="{{ url_for('upload') }}" {% if request.endpoint=='upload' %}class="active"{% endif %}>Upload</a></li>
    <li><a href="{{ url_for('browse') }}" {% if request.endpoint=='browse' %}class="active"{% endif %}>Browse</a></li>
    <li><a href="{{ url_for('query_page') }}" {% if request.endpoint=='query_page' %}class="active"{% endif %}>SQL Query</a></li>
  </ul>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
